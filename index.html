<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SciOly Food Science Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --bg2: #161b26;
    --bg3: #1e2535;
    --border: #2a3245;
    --accent: #4ade80;
    --accent2: #86efac;
    --amber: #fbbf24;
    --coral: #fb7185;
    --text: #e8edf5;
    --muted: #7a8ba8;
    --card: #131929;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 28px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 36px; }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; opacity: 0.8; }
  .progress-strip { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 16px; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .week-dots { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .week-dot { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .week-dot:hover { border-color: var(--accent); color: var(--accent); }
  .week-dot.done { background: rgba(74,222,128,0.12); border-color: var(--accent); color: var(--accent2); }
  .week-dot.active { background: var(--accent); color: #0e1117; font-weight: 500; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 24px; }
  .panel-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .panel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .panel-title { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .panel-week { margin-left: auto; font-family: 'Fraunces', serif; font-size: 13px; color: var(--accent2); }
  #view-greeting { padding: 32px 28px; }
  .greeting-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 300; line-height: 1.2; margin-bottom: 8px; }
  .greeting-title em { font-style: italic; color: var(--accent2); }
  .greeting-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .plan-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; display: flex; gap: 10px; align-items: flex-start; }
  .plan-item:hover { border-color: var(--accent); background: rgba(74,222,128,0.05); }
  .plan-item.done { opacity: 0.5; }
  .plan-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); padding-top: 2px; min-width: 28px; }
  .plan-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .plan-sub { font-size: 11px; color: var(--muted); }
  .cta-btn { background: var(--accent); color: #0e1117; border: none; padding: 12px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .cta-btn:hover { background: var(--accent2); }
  #view-study { display: none; padding: 0; }
  .study-topic-bar { padding: 20px 28px 0; }
  .topic-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .topic-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 300; margin-bottom: 4px; }
  .topic-desc { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .time-bar { display: flex; gap: 6px; margin-bottom: 24px; padding: 0 28px; }
  .time-seg { height: 4px; border-radius: 2px; flex: 1; background: var(--border); position: relative; overflow: hidden; }
  .time-seg-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); width: 0%; transition: width 0.6s ease; border-radius: 2px; }
  #resource-list { padding: 0 28px 28px; }
  .resource-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; opacity: 0; transform: translateY(8px); animation: fadeUp 0.3s ease forwards; transition: border-color 0.15s; }
  .resource-card:hover { border-color: var(--accent); }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .res-type-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; margin-top: 2px; }
  .badge-video { background: rgba(251,191,36,0.12); color: var(--amber); border: 1px solid rgba(251,191,36,0.25); }
  .badge-read  { background: rgba(74,222,128,0.10); color: var(--accent2); border: 1px solid rgba(74,222,128,0.2); }
  .badge-activity { background: rgba(251,113,133,0.10); color: var(--coral); border: 1px solid rgba(251,113,133,0.2); }
  .res-body { flex: 1; }
  .res-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .res-source { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .res-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }
  .res-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); margin-top: 6px; }
  .res-link { font-size: 11px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; opacity: 0.8; }
  .res-link:hover { opacity: 1; }
  .res-section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
  .res-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .concepts-box { background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.15); border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; }
  .concepts-title { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .concepts-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .concept-tag { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 12px; color: var(--text); }
  .bottom-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding: 0 28px 24px; }
  .nav-btn { background: var(--bg3); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary { background: var(--accent); color: #0e1117; border-color: var(--accent); font-weight: 500; }
  .nav-btn.primary:hover { background: var(--accent2); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width: 560px) { .plan-grid { grid-template-columns: 1fr; } .greeting-title { font-size: 24px; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SciOly <span>Food Science</span></div>
    <div class="badge">DIV B · RESEARCHER</div>

      <div class="time-bar" id="time-bar">

        <div class="time-seg"><div class="time-seg-fill"></div></div>
        <div class="time-seg"><div class="time-seg-fill"></div></div>

      <div id="resource-list">
        <div id="resource-content"></div>
      </div>
      <div class="bottom-nav">
        <button class="nav-btn" onclick="showGreeting()">← Back to plan</button>
        <button class="nav-btn primary" id="done-btn" onclick="markDone()">Mark week done ✓</button>
      </div>
    </div>
  </div>
</div>

let currentWeek = 1;
let doneWeeks = new Set();

function init() {
  try {
    const saved = localStorage.getItem('scioly_fs_done');
    if (saved) doneWeeks = new Set(JSON.parse(saved));
    const savedWeek = localStorage.getItem('scioly_fs_week');
    if (savedWeek) currentWeek = parseInt(savedWeek);
  } catch(e) {}
  renderDots();
  renderPlan();
  showGreeting();
}

function renderDots() {
  document.getElementById('week-dots').innerHTML = STUDY_PLAN.map(w =>
    `<div class="week-dot ${doneWeeks.has(w.week)?'done':''} ${w.week===currentWeek?'active':''}"
      onclick="jumpWeek(${w.week})">${w.week}</div>`
  ).join('');
}

function renderPlan() {
  document.getElementById('plan-grid').innerHTML = STUDY_PLAN.map(w =>
    `<div class="plan-item ${doneWeeks.has(w.week)?'done':''}" onclick="startWeek(${w.week})">
      <div class="plan-num">W${w.week}</div>
      <div class="plan-info">
        <div class="plan-name">${w.name}</div>
        <div class="plan-sub">${w.sub}</div>
      </div>
    </div>`
  ).join('');
  document.getElementById('start-week-label').textContent = currentWeek;
}

function jumpWeek(w) {
  currentWeek = w;
  try { localStorage.setItem('scioly_fs_week', w); } catch(e) {}
  renderDots();
  document.getElementById('start-week-label').textContent = w;
}

function showGreeting() {
  document.getElementById('view-greeting').style.display = 'block';
  document.getElementById('view-study').style.display = 'none';
  document.getElementById('panel-label').textContent = 'Study planner';
  document.getElementById('panel-week').textContent = '';
}

function startWeek(w) {
  currentWeek = w;
  try { localStorage.setItem('scioly_fs_week', w); } catch(e) {}
  const plan = STUDY_PLAN.find(p => p.week === w);
  const data = RESOURCES[w];
  document.getElementById('view-greeting').style.display = 'none';
  document.getElementById('view-study').style.display = 'block';
  document.getElementById('panel-label').textContent = 'Researcher agent';
  document.getElementById('panel-week').textContent = `Week ${w} of 14`;
  document.getElementById('study-eyebrow').textContent = `Week ${w} — Food Science`;
  document.getElementById('study-title').textContent = plan.name;
  document.getElementById('study-desc').textContent = plan.desc;
  document.querySelectorAll('.time-seg-fill').forEach(el => el.style.width = '0%');

  const videos = data.resources.filter(r => r.type === 'video');
  const reads  = data.resources.filter(r => r.type === 'read');
  const acts   = data.resources.filter(r => r.type === 'activity');

  let html = `<div class="concepts-box">
    <div class="concepts-title">Key concepts this week</div>
    <div class="concepts-list">${data.concepts.map(c=>`<span class="concept-tag">${c}</span>`).join('')}</div>
  </div>`;

  if (videos.length) { html += `<div class="res-section-label">Watch first</div>` + videos.map((r,i)=>card(r,i*80)).join(''); }
  if (reads.length)  { html += `<div class="res-section-label">Then read</div>`   + reads.map((r,i)=>card(r,(videos.length+i)*80)).join(''); }
  if (acts.length)   { html += `<div class="res-section-label">Hands-on activity</div>` + acts.map((r,i)=>card(r,(videos.length+reads.length+i)*80)).join(''); }

  document.getElementById('resource-content').innerHTML = html;

  setTimeout(() => {
    [65,80,90,100].forEach((v,i) => setTimeout(()=>{ document.querySelectorAll('.time-seg-fill')[i].style.width=v+'%'; }, i*180));
  }, 300);
}

function card(r, delay) {
  const badges = { video:'badge-video', read:'badge-read', activity:'badge-activity' };
  const labels = { video:'VIDEO', read:'READING', activity:'ACTIVITY' };
  const linkText = r.url && r.url.includes('google.com') ? 'Search for this ↗' : 'Open on YouTube ↗';
  const link = r.url ? `<a class="res-link" href="${r.url}" target="_blank" rel="noopener">${linkText}</a>` : '';
  return `<div class="resource-card" style="animation-delay:${delay}ms">
    <div class="res-type-badge ${badges[r.type]}">${labels[r.type]}</div>
    <div class="res-body">
      <div class="res-title">${r.title}</div>
      <div class="res-source">${r.source}</div>
      <div class="res-desc">${r.desc}</div>
      <div class="res-time">⏱ ${r.time}</div>
      ${link}
    </div>
  </div>`;
}

function markDone() {
  doneWeeks.add(currentWeek);
  try { localStorage.setItem('scioly_fs_done', JSON.stringify([...doneWeeks])); } catch(e) {}
  if (currentWeek < 14) currentWeek++;
  try { localStorage.setItem('scioly_fs_week', currentWeek); } catch(e) {}
  renderDots();
  renderPlan();
  showGreeting();
}

init();
</script>
